[/Script/Engine.RendererSettings]
; As of 5.7, r.DistanceFields is 1 by default on Android.
; This forces a separate depth prepass renderpass, which
; adds significant render time and causes graphical issues
; when used with foveated rendering. To work around this,
; we disable r.DistanceFields by default.
r.DistanceFields=0

; Use original legacy facing direction for stereo layers

[/Script/OpenXRHMD.OpenXRHMDSettings]
bIsFBFoveationEnabled=True

[ConsoleVariables]
XR.StereoLayers.UseLegacyFacing=1
